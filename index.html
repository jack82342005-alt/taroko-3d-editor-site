<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Taroko 3D Editor</title>
  <style>
    :root {
      --bg-top: #efe7da;
      --bg-bottom: #dfead0;
      --panel: rgba(255, 255, 255, 0.94);
      --panel-border: rgba(67, 88, 60, 0.12);
      --text: #203124;
      --muted: #5a6b5c;
      --accent: #8d7446;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: "Microsoft JhengHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 78%, rgba(190, 214, 161, 0.55), transparent 32%),
        radial-gradient(circle at 85% 18%, rgba(255, 255, 255, 0.78), transparent 28%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .panel {
      position: absolute;
      z-index: 2;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 22px;
      backdrop-filter: blur(12px);
      box-shadow: 0 18px 48px rgba(54, 68, 48, 0.10);
    }

    .title {
      top: 20px;
      left: 20px;
      padding: 18px 22px;
      max-width: min(560px, calc(100vw - 40px));
    }

    .title h1 {
      margin: 0 0 8px;
      font-size: clamp(22px, 2.2vw, 34px);
      line-height: 1.2;
    }

    .title p,
    .editor p,
    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .editor {
      top: 20px;
      right: 20px;
      width: min(380px, calc(100vw - 40px));
      padding: 16px 18px;
      max-height: calc(100vh - 40px);
      overflow: auto;
    }

    .editor h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .section {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid rgba(67, 88, 60, 0.08);
    }

    .section:first-of-type {
      margin-top: 14px;
    }

    .section-title {
      margin: 0 0 10px;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .field {
      margin: 12px 0 14px;
    }

    .field label {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
      font-size: 13px;
    }

    .field output {
      color: var(--muted);
    }

    .field input,
    .field select {
      width: 100%;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      font: inherit;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #8d7446, #a88d59);
      box-shadow: 0 10px 18px rgba(145, 114, 63, 0.2);
    }

    button.secondary {
      background: linear-gradient(135deg, #708163, #5f6f58);
    }

    button.ghost {
      color: var(--text);
      background: rgba(141, 116, 70, 0.1);
      box-shadow: none;
    }

    .status {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(141, 116, 70, 0.09);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
    }

    .hint {
      left: 20px;
      bottom: 20px;
      padding: 12px 16px;
      max-width: min(460px, calc(100vw - 40px));
    }

    .hint strong {
      display: block;
      margin-bottom: 4px;
      color: var(--text);
    }

    @media (max-width: 900px) {
      .editor {
        top: auto;
        bottom: 20px;
        right: 20px;
      }

      .hint {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="panel title">
      <h1 id="titleText">Taroko Main Site Editor</h1>
      <p id="titleDesc"></p>
    </div>

    <div class="panel editor">
      <h2 id="editorTitle">Editor</h2>
      <p id="editorDesc"></p>

      <div class="section">
        <div class="section-title" id="sectionSiteTitle">Site</div>
        <div class="field">
          <label for="siteScale"><span id="labelSiteScale">Site Scale</span> <output id="siteScaleValue">1.00</output></label>
          <input id="siteScale" type="range" min="0.8" max="3.2" step="0.05" value="1.55">
        </div>
        <div class="field">
          <label for="boundaryScale"><span id="labelBoundaryScale">Boundary Scale</span> <output id="boundaryScaleValue">1.40</output></label>
          <input id="boundaryScale" type="range" min="1.0" max="3.0" step="0.05" value="1.40">
        </div>
      </div>

      <div class="section">
        <div class="section-title" id="sectionObjectTitle">Object</div>
        <div class="field">
          <label for="objectSelect"><span id="labelObject">Current Object</span> <output id="selectedName">None</output></label>
          <select id="objectSelect"></select>
        </div>

        <div class="field">
          <label for="posX"><span id="labelPosX">X</span> <output id="posXValue">0</output></label>
          <input id="posX" type="range" min="-50" max="50" step="0.5" value="0">
        </div>

        <div class="field">
          <label for="posZ"><span id="labelPosZ">Z</span> <output id="posZValue">0</output></label>
          <input id="posZ" type="range" min="-35" max="35" step="0.5" value="0">
        </div>

        <div class="field">
          <label for="scaleValue"><span id="labelScale">Scale</span> <output id="scaleValueLabel">1.00</output></label>
          <input id="scaleValue" type="range" min="0.5" max="2.5" step="0.05" value="1">
        </div>
      </div>

      <div class="section">
        <div class="section-title" id="sectionAddTitle">Add Assets</div>
        <div class="buttons">
          <button id="addAudienceTent" class="secondary">Add Tent</button>
          <button id="addLedWall" class="secondary">Add LED</button>
          <button id="addToilet" class="secondary">Add Toilet</button>
        </div>
      </div>

      <div class="section">
        <div class="section-title" id="sectionToolsTitle">Tools</div>
        <div class="buttons">
          <button id="resetView">Reset View</button>
          <button id="toggleRotate" class="secondary">Toggle Auto Rotate</button>
          <button id="duplicateTent" class="secondary">Duplicate Tent</button>
          <button id="deleteAsset" class="ghost">Delete Asset</button>
          <button id="resetLayout" class="ghost">Reset Layout</button>
          <button id="saveLayout" class="ghost">Save</button>
          <button id="importLayout" class="ghost">Import</button>
          <button id="exportLayout" class="ghost">Export</button>
        </div>
        <input id="importLayoutFile" type="file" accept=".json,application/json" hidden>
      </div>

      <div class="status" id="statusText">Status</div>
    </div>

    <div class="panel hint">
      <strong id="hintTitle">Hint</strong>
      <span id="hintText"></span>
    </div>
  </div>

      objectSelect: document.getElementById("objectSelect"),
      importLayoutFile: document.getElementById("importLayoutFile"),
      selectedName: document.getElementById("selectedName"),
      posX: document.getElementById("posX"),
      posZ: document.getElementById("posZ"),
      scaleValue: document.getElementById("scaleValue"),
      posXValue: document.getElementById("posXValue"),
      posZValue: document.getElementById("posZValue"),
      scaleValueLabel: document.getElementById("scaleValueLabel"),
      statusText: document.getElementById("statusText")
    };

    function material(hex, roughness = 0.88, metalness = 0.03) {
      return new THREE.MeshStandardMaterial({ color: hex, roughness, metalness });
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function makeLabelCanvas(text, fontSize = 42) {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      const padX = 18;
      const padY = 10;
      ctx.font = `700 ${fontSize}px "Microsoft JhengHei"`;
      const metrics = ctx.measureText(text);
      canvas.width = Math.ceil(metrics.width + padX * 2);
      canvas.height = Math.ceil(fontSize + padY * 2);
      ctx.font = `700 ${fontSize}px "Microsoft JhengHei"`;
      ctx.fillStyle = "rgba(255,255,255,0.92)";
      roundRect(ctx, 0, 0, canvas.width, canvas.height, 18);
      ctx.fill();
      ctx.fillStyle = "#243227";
      ctx.textBaseline = "middle";
      ctx.fillText(text, padX, canvas.height / 2);
      return canvas;
    }

    function labelSprite(text, scale = 11) {
      const texture = new THREE.CanvasTexture(makeLabelCanvas(text));
      texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
      const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
        map: texture,
        transparent: true,
        depthTest: false,
        depthWrite: false
      }));
      sprite.scale.set(scale * 1.2, scale * 0.42, 1);
      sprite.center.set(0.5, 0);
      sprite.renderOrder = 999;
      return sprite;
    }

    function world(siteX, siteZ) {
      return new THREE.Vector3(siteX - 50, 0, siteZ - 36);
    }

    function spreadSitePoint(siteX, siteZ, scale = 1) {
      const worldX = siteX - 50;
      const worldZ = siteZ - 36;
      return {
        x: SITE_CENTER.x + (worldX - SITE_CENTER.x) * scale,
        z: SITE_CENTER.z + (worldZ - SITE_CENTER.z) * scale
      };
    }

    function worldToLocal(point) {
      return new THREE.Vector3(
        point.x / root.scale.x,
        0,
        point.z / root.scale.z
      );
    }

    function getSitePolygon(scale = siteBoundaryScale) {
      return BASE_SITE_POLYGON.map(([x, z]) => [
        SITE_CENTER.x + (x - SITE_CENTER.x) * scale,
        SITE_CENTER.z + (z - SITE_CENTER.z) * scale
      ]);
    }

    function pointInPolygon(x, z, polygon) {
      let inside = false;
      for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i, i += 1) {
        const xi = polygon[i][0];
        const zi = polygon[i][1];
        const xj = polygon[j][0];
        const zj = polygon[j][1];
        const intersects = ((zi > z) !== (zj > z)) && (x < ((xj - xi) * (z - zi)) / (zj - zi + 0.000001) + xi);
        if (intersects) inside = !inside;
      }
      return inside;
    }

    function nearestInsidePoint(x, z) {
      const polygon = getSitePolygon();
      if (pointInPolygon(x, z, polygon)) {
        return { x, z };
      }

      const center = polygon.reduce((acc, point) => {
        acc.x += point[0];
        acc.z += point[1];
        return acc;
      }, { x: 0, z: 0 });

      center.x /= polygon.length;
      center.z /= polygon.length;

      let tMin = 0;
      let tMax = 1;
      for (let i = 0; i < 18; i += 1) {
        const t = (tMin + tMax) / 2;
        const testX = center.x + (x - center.x) * t;
        const testZ = center.z + (z - center.z) * t;
        if (pointInPolygon(testX, testZ, polygon)) {
          tMin = t;
        } else {
          tMax = t;
        }
      }

      return {
        x: center.x + (x - center.x) * tMin,
        z: center.z + (z - center.z) * tMin
      };
    }

    function updateStatus(text) {
      editorControls.statusText.textContent = text;
    }

    function applySiteScale(scale) {
      root.scale.set(scale, scale, scale);
      editorControls.siteScale.value = scale.toFixed(2);
      editorControls.siteScaleValue.textContent = scale.toFixed(2);
    }

    function refreshSiteBoundary() {
      const polygon = getSitePolygon();
      const shape = new THREE.Shape();
      polygon.forEach(([x, z], index) => {
        if (index === 0) shape.moveTo(x, z);
        else shape.lineTo(x, z);
      });
      shape.closePath();

      const fillGeometry = new THREE.ShapeGeometry(shape);
      if (siteFillMesh.geometry) {
        siteFillMesh.geometry.dispose();
      }
      siteFillMesh.geometry = fillGeometry;

      const edgePoints = polygon.map(([x, z]) => new THREE.Vector3(x, 0.12, z));
      edgePoints.push(new THREE.Vector3(polygon[0][0], 0.12, polygon[0][1]));
      const edgeGeometry = new THREE.BufferGeometry().setFromPoints(edgePoints);
      if (siteEdge.geometry) {
        siteEdge.geometry.dispose();
      }
      siteEdge.geometry = edgeGeometry;
    }

    function refreshTrees() {
      treeItems.forEach((tree) => {
        const expanded = spreadSitePoint(tree.siteX, tree.siteZ, siteBoundaryScale * 0.8);
        tree.group.position.set(expanded.x, 0, expanded.z);
      });
    }

    function applyBoundaryScale(scale) {
      siteBoundaryScale = scale;
      editorControls.boundaryScale.value = scale.toFixed(2);
      editorControls.boundaryScaleValue.textContent = scale.toFixed(2);
      if (siteFillMesh && siteEdge) {
        refreshSiteBoundary();
        refreshTrees();
      }
    }

    function frameSceneToRoot() {
      const bounds = new THREE.Box3();
      let hasContent = false;

      editableObjects.forEach((item) => {
        bounds.expandByObject(item.group);
        hasContent = true;
      });

      if (!hasContent) {
        const polygon = getSitePolygon();
        polygon.forEach(([x, z]) => {
          bounds.expandByPoint(new THREE.Vector3(x, 0, z));
        });
      }

      if (bounds.isEmpty()) return;

      const size = bounds.getSize(new THREE.Vector3());
      const center = bounds.getCenter(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.z, 1);
      const nextTarget = new THREE.Vector3(center.x, Math.max(6, center.y + size.y * 0.1), center.z);
      const nextPosition = new THREE.Vector3(
        center.x + maxDim * 0.92,
        Math.max(78, size.y + maxDim * 0.86),
        center.z + maxDim * 1.02
      );

      cameraHome.position.copy(nextPosition);
      cameraHome.target.copy(nextTarget);
      camera.position.copy(cameraHome.position);
      controls.target.copy(cameraHome.target);
      controls.minDistance = Math.max(28, maxDim * 0.35);
      controls.maxDistance = Math.max(220, maxDim * 3.0);
      controls.update();
    }

    function addGround() {
      const meadow = new THREE.Mesh(new THREE.PlaneGeometry(280, 220), material(0xe9ede2, 1, 0));
      meadow.rotation.x = -Math.PI / 2;
      meadow.receiveShadow = true;
      root.add(meadow);

      siteFillMesh = new THREE.Mesh(new THREE.BufferGeometry(), material(0xf8f8f2, 1, 0));
      siteFillMesh.rotation.x = -Math.PI / 2;
      siteFillMesh.position.y = 0.02;
      siteFillMesh.receiveShadow = true;
      root.add(siteFillMesh);

      siteEdge = new THREE.Line(
        new THREE.BufferGeometry(),
        new THREE.LineBasicMaterial({ color: 0xa5b592 })
      );
      root.add(siteEdge);
      refreshSiteBoundary();
    }

    function addTree(siteX, siteZ, scale = 1) {
      const group = new THREE.Group();
      const expanded = spreadSitePoint(siteX, siteZ, siteBoundaryScale * 0.8);
      group.position.set(expanded.x, 0, expanded.z);

      const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.45 * scale, 0.6 * scale, 5 * scale, 10), material(0x7f5a34));
      trunk.position.y = 2.5 * scale;
      trunk.castShadow = true;
      group.add(trunk);

      const canopy1 = new THREE.Mesh(new THREE.SphereGeometry(3.4 * scale, 14, 12), material(0x3f7446));
      canopy1.position.set(0, 7.5 * scale, 0);
      canopy1.castShadow = true;
      group.add(canopy1);

      const canopy2 = new THREE.Mesh(new THREE.SphereGeometry(2.7 * scale, 12, 10), material(0x4d8555));
      canopy2.position.set(2 * scale, 8.4 * scale, 1.2 * scale);
      canopy2.castShadow = true;
      group.add(canopy2);

      const shadow = new THREE.Mesh(
        new THREE.CylinderGeometry(4.2 * scale, 4.2 * scale, 0.2, 24),
        new THREE.MeshBasicMaterial({ color: 0x60715d, transparent: true, opacity: 0.18 })
      );
      shadow.position.y = 0.12;
      group.add(shadow);

      root.add(group);
      treeItems.push({ group, siteX, siteZ, scale });
    }

    function registerEditable(config, group, hitbox) {
      hitbox.geometry.computeBoundingBox();
      const hitboxBounds = hitbox.geometry.boundingBox;
      const scaleRadius = Math.max(Math.abs(hitboxBounds.max.x), Math.abs(hitboxBounds.max.z), 4);

      const scaleHandle = new THREE.Mesh(
        new THREE.SphereGeometry(0.72, 18, 18),
        new THREE.MeshStandardMaterial({ color: 0xc58430, roughness: 0.45, metalness: 0.08 })
      );
      scaleHandle.position.set(scaleRadius, hitboxBounds.max.y + 0.7, scaleRadius);
      scaleHandle.castShadow = true;
      scaleHandle.userData.kind = "scaleHandle";
      group.add(scaleHandle);

      const item = {
        id: config.id,
        name: config.name,
        type: config.type,
        group,
        hitbox,
        scaleHandle,
        scaleRadius,
        isDefault: Boolean(config.isDefault),
        defaultPosition: group.position.clone(),
        defaultScale: group.scale.clone()
      };
      hitbox.userData.kind = "moveHandle";
      hitbox.userData.item = item;
      scaleHandle.userData.item = item;
      interactiveMeshes.push(hitbox, scaleHandle);
      editableObjects.push(item);
      objectMap.set(item.id, item);
      return item;
    }

    function removeEditableItem(item) {
      if (!item) return;
      const moveIndex = interactiveMeshes.indexOf(item.hitbox);
      if (moveIndex >= 0) interactiveMeshes.splice(moveIndex, 1);
      const scaleIndex = interactiveMeshes.indexOf(item.scaleHandle);
      if (scaleIndex >= 0) interactiveMeshes.splice(scaleIndex, 1);
      const editIndex = editableObjects.indexOf(item);
      if (editIndex >= 0) editableObjects.splice(editIndex, 1);
      objectMap.delete(item.id);
      root.remove(item.group);
    }

    function applyItemPosition(item, x, z) {
      if (!item) return;
      const safe = nearestInsidePoint(x, z);
      item.group.position.x = safe.x;
      item.group.position.z = safe.z;
    }

    function buildTent(config) {
      const {
        name,
        type,
        position,
        id,
        labelText = name,
        width = 8.2,
        depth = 8.2,
        height = 6.2,
        roofHex = 0xefe1ab
      } = config;
      const group = new THREE.Group();
      group.position.set(position[0], 0, position[1]);

      const floor = new THREE.Mesh(new THREE.BoxGeometry(width + 1.6, 0.45, depth + 1.6), material(0xf1eee5));
      floor.position.y = 0.22;
      floor.receiveShadow = true;
      group.add(floor);

      const roof = new THREE.Mesh(new THREE.ConeGeometry(Math.max(width, depth) * 0.64, height, 4), material(roofHex, 0.92));
      roof.rotation.y = Math.PI / 4;
      roof.position.y = height * 0.74;
      roof.castShadow = true;
      group.add(roof);

      [[-width / 2, -depth / 2], [width / 2, -depth / 2], [width / 2, depth / 2], [-width / 2, depth / 2]].forEach(([px, pz]) => {
        const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.18, height, 8), material(0x94784b));
        pole.position.set(px, height / 2, pz);
        pole.castShadow = true;
        group.add(pole);
      });

      if (labelText) {
        const label = labelSprite(labelText, 9.5);
        label.position.set(0, height + 4.6, 0);
        group.add(label);
      }

      const hitbox = new THREE.Mesh(
        new THREE.BoxGeometry(width + 4, Math.max(height + 6, 10), depth + 4),
        new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0 })
      );
      hitbox.position.y = Math.max(height + 6, 10) / 2;
      group.add(hitbox);

      root.add(group);
      return registerEditable({ id, name, type, isDefault: config.isDefault }, group, hitbox);
    }

    function buildStage(config) {
      const group = new THREE.Group();
      group.position.set(config.position[0], 0, config.position[1]);

      const base = new THREE.Mesh(new THREE.CylinderGeometry(16.5, 16.5, 2.4, 72), material(0xb9cb98));
      base.position.y = 1.4;
      base.castShadow = true;
      base.receiveShadow = true;
      group.add(base);

      const inner = new THREE.Mesh(new THREE.CylinderGeometry(12.6, 12.6, 1.9, 72), material(0xf7f7f1));
      inner.position.y = 2.35;
      inner.castShadow = true;
      inner.receiveShadow = true;
      group.add(inner);

      const torchBase = new THREE.Mesh(new THREE.CylinderGeometry(3.8, 3.8, 0.7, 48), material(0xd2bb8d));
      torchBase.position.y = 2.95;
      group.add(torchBase);

      const flame = new THREE.Mesh(new THREE.ConeGeometry(1.0, 4.0, 20), material(0xf59f3a, 0.35, 0));
      flame.position.y = 5.2;
      flame.castShadow = true;
      group.add(flame);

      const labelStage = labelSprite("\u4e3b\u821e\u53f0", 10.5);

      const labelTorch = labelSprite("\u8056\u706b\u53f0", 8.8);

      const hitbox = new THREE.Mesh(
        new THREE.CylinderGeometry(17.8, 17.8, 15, 32),

      hitbox.position.y = 7.5;

      root.add(group);

    function buildCampfire(config) {
      const group = new THREE.Group();
      group.position.set(config.position[0], 0, config.position[1]);

      const ring = new THREE.Mesh(new THREE.CylinderGeometry(6.6, 6.6, 0.7, 32), material(0xe7d0a8));
      ring.position.y = 0.4;
      group.add(ring);

      const pit = new THREE.Mesh(new THREE.CylinderGeometry(3.0, 3.0, 1.0, 24), material(0xc89c60));
      pit.position.y = 0.95;
      group.add(pit);

      const fire = new THREE.Mesh(new THREE.ConeGeometry(1.8, 5.0, 16), material(0xf39734, 0.25, 0));
      fire.position.y = 3.5;
      group.add(fire);

      const label = labelSprite("\u71df\u706b\u5340", 9.2);
      label.position.set(0, 9.6, 0);
      group.add(label);

      const hitbox = new THREE.Mesh(
        new THREE.CylinderGeometry(7.6, 7.6, 11, 24),

      hitbox.position.y = 5.5;
      group.add(hitbox);

    function buildLedWall(config) {
      const group = new THREE.Group();
      group.position.set(config.position[0], 0, config.position[1]);
      group.rotation.y = config.rotationY || 0;

      const frame = new THREE.Mesh(new THREE.BoxGeometry(1.1, 9.0, 3.4), material(0x2f3438, 0.4, 0.7));
      frame.position.y = 4.5;
      group.add(frame);

      const screen = new THREE.Mesh(new THREE.PlaneGeometry(2.4, 7.2), material(0x191d23, 0.45, 0.55));
      screen.position.set(0.62, 4.6, 0);
      screen.rotation.y = Math.PI / 2;
      group.add(screen);

      const label = labelSprite(config.name, 8.8);
      label.position.set(0, 10.8, 0);
      group.add(label);

      const hitbox = new THREE.Mesh(
        new THREE.BoxGeometry(4.3, 10.8, 5.4),
        new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0 })
      );
      hitbox.position.y = 5.4;
      group.add(hitbox);

      root.add(group);
      return registerEditable(config, group, hitbox);
    }

    function buildEntranceGate(config) {
      const group = new THREE.Group();
      group.position.set(config.position[0], 0, config.position[1]);

      const base = new THREE.Mesh(new THREE.BoxGeometry(12.5, 0.4, 7.2), material(0xf4f1e8));
      base.position.y = 0.22;
      group.add(base);

      [[-4.5, -1.8], [4.5, -1.8], [-4.5, 1.8], [4.5, 1.8]].forEach(([px, pz]) => {
        const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.16, 5.8, 8), material(0x94784b));
        pole.position.set(px, 2.9, pz);
        group.add(pole);
      });

      const roof = new THREE.Mesh(new THREE.ConeGeometry(5.8, 5.8, 4), material(0xefe1ab));
      roof.rotation.y = Math.PI / 4;
      roof.position.y = 6.8;
      group.add(roof);

      const label = labelSprite("\u5165\u53e3", 9.2);
      label.position.set(0, 12.6, 0);
      group.add(label);

      const hitbox = new THREE.Mesh(
        new THREE.BoxGeometry(14, 12, 8.8),
        new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0 })
      );
      hitbox.position.y = 6;
      group.add(hitbox);

      root.add(group);
      return registerEditable(config, group, hitbox);
    }

    function buildToiletArea(config) {
      const group = new THREE.Group();
      group.position.set(config.position[0], 0, config.position[1]);

      const pad = new THREE.Mesh(new THREE.BoxGeometry(11.2, 0.28, 12.5), material(0xd7ecf8));
      pad.position.y = 0.14;
      group.add(pad);

      for (let row = 0; row < 3; row += 1) {
        for (let col = 0; col < 2; col += 1) {
          const unit = new THREE.Group();
          unit.position.set((col - 0.5) * 3.8, 0.28, (row - 1) * 3.2);

          const body = new THREE.Mesh(new THREE.BoxGeometry(2.6, 3.5, 2.2), material(0x9fcdee));
          body.position.y = 1.75;
          body.castShadow = true;
          unit.add(body);

          const roof = new THREE.Mesh(new THREE.BoxGeometry(2.7, 0.12, 2.3), material(0xf1f8fd));
          roof.position.y = 3.58;
          unit.add(roof);

          group.add(unit);
        }
      }

      const label = labelSprite("\u6d41\u52d5\u5ec1\u6240\u5340", 8.8);
      label.position.set(0, 9.0, 0);
      group.add(label);

      const hitbox = new THREE.Mesh(
        new THREE.BoxGeometry(12.5, 10, 14),
        new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0 })
      );
      hitbox.position.y = 5;
      group.add(hitbox);

      root.add(group);
      return registerEditable(config, group, hitbox);
    }

    function createAsset(config) {
      switch (config.type) {
        case "stage":
          return buildStage(config);
        case "campfire":
          return buildCampfire(config);
        case "ledWall":
          return buildLedWall(config);
        case "officialsTent":
          return buildTent({ ...config, width: 9.8, depth: 17.5, height: 7.2, labelText: "\u9577\u5b98\u5340" });
        case "backstageTent":
          return buildTent({ ...config, width: 8.4, depth: 9.8, height: 6.6, labelText: config.name === "\u5f8c\u53f0 A" ? "\u5f8c\u53f0\u5340" : "" });
        case "audienceTent":
          return buildTent({ ...config, width: 8.8, depth: 10.2, height: 6.8, labelText: config.labelText || (config.id === "audience-a" ? "\u89c0\u773e\u5e33\u7bf7\u5340" : "") });
        case "entranceGate":
          return buildEntranceGate(config);
        case "toiletArea":
          return buildToiletArea(config);
        default:
          throw new Error(`Unknown asset type: ${config.type}`);
      }
    }

    function populateObjectSelect() {
      const currentId = selectedItem ? selectedItem.id : "";
      editorControls.objectSelect.innerHTML = "";
      editableObjects.forEach((item, index) => {
        const option = document.createElement("option");
        option.value = item.id;
        option.textContent = `${index + 1}. ${item.name}`;
        editorControls.objectSelect.appendChild(option);
      });
      if (currentId && objectMap.has(currentId)) {
        editorControls.objectSelect.value = currentId;
      }
    }

    function updateControlValues() {
      editorControls.siteScale.value = root.scale.x.toFixed(2);
      editorControls.siteScaleValue.textContent = root.scale.x.toFixed(2);
      editorControls.boundaryScale.value = siteBoundaryScale.toFixed(2);
      editorControls.boundaryScaleValue.textContent = siteBoundaryScale.toFixed(2);
      if (!selectedItem) {
        editorControls.selectedName.textContent = "\u672a\u9078\u53d6";
        editorControls.objectSelect.value = "";
        return;
      }
      editorControls.selectedName.textContent = selectedItem.name;
      editorControls.objectSelect.value = selectedItem.id;
      editorControls.posX.value = selectedItem.group.position.x.toFixed(1);
      editorControls.posZ.value = selectedItem.group.position.z.toFixed(1);
      editorControls.scaleValue.value = selectedItem.group.scale.x.toFixed(2);
      editorControls.posXValue.textContent = Number(editorControls.posX.value).toFixed(1);
      editorControls.posZValue.textContent = Number(editorControls.posZ.value).toFixed(1);
      editorControls.scaleValueLabel.textContent = Number(editorControls.scaleValue.value).toFixed(2);
    }

    function setItemHighlight(item, active) {
      if (!item) return;
      item.hitbox.material.opacity = active ? 0.16 : 0;
      item.hitbox.material.color.set(active ? 0x9b7b32 : 0xffffff);
      item.scaleHandle.material.color.set(active ? 0xd79c3a : 0xc58430);
      item.scaleHandle.material.emissive.set(active ? 0x563916 : 0x000000);
    }

    function selectItem(item) {
      setItemHighlight(selectedItem, false);
      selectedItem = item;
      setItemHighlight(selectedItem, true);
      updateControlValues();
      if (selectedItem) {
        updateStatus(`${UI_TEXT.statusSelected}${selectedItem.name}`);
      } else {
        updateStatus(UI_TEXT.statusIdle);
      }
    }

    function resetLayout() {
      [...editableObjects].forEach((item) => {
        removeEditableItem(item);
      });
      DEFAULT_SITE_OBJECTS.forEach((config) => createAsset(config));
      applySiteScale(DEFAULT_SITE_SCALE);
      applyBoundaryScale(DEFAULT_BOUNDARY_SCALE);
      populateObjectSelect();
      selectItem(editableObjects[0] || null);
      frameSceneToRoot();
      updateStatus(UI_TEXT.statusLayoutReset);
    }

    function updatePointer(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    }

    function pickItem(event) {
      updatePointer(event);
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(interactiveMeshes, false);
      if (!hits.length) return null;
      return {
        item: hits[0].object.userData.item,
        kind: hits[0].object.userData.kind
      };
    }

    function updateDraggedItem(event) {
      if ((!dragging && !scaling) || !selectedItem) return;
      updatePointer(event);
      raycaster.setFromCamera(pointer, camera);
      if (raycaster.ray.intersectPlane(dragPlane, dragPoint)) {
        const localPoint = worldToLocal(dragPoint);
        if (scaling) {
          const dx = localPoint.x - selectedItem.group.position.x;
          const dz = localPoint.z - selectedItem.group.position.z;
          const nextScale = THREE.MathUtils.clamp(Math.sqrt(dx * dx + dz * dz) / selectedItem.scaleRadius, 0.5, 2.5);
          selectedItem.group.scale.setScalar(nextScale);
        } else {
          applyItemPosition(selectedItem, localPoint.x - dragOffset.x, localPoint.z - dragOffset.z);
        }
        updateControlValues();
      }
    }

    function saveLayoutToStorage() {
      const payload = {
        sceneScale: Number(root.scale.x.toFixed(2)),
        boundaryScale: Number(siteBoundaryScale.toFixed(2)),
        counters: assetCounters,
        items: editableObjects.map((item) => ({
          id: item.id,
          name: item.name,
          type: item.type,
          isDefault: item.isDefault,
          position: [Number(item.group.position.x.toFixed(2)), Number(item.group.position.z.toFixed(2))],
          scale: Number(item.group.scale.x.toFixed(2))
        }))
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
    }

    function normalizeSavedPosition(position) {
      if (Array.isArray(position) && position.length >= 2) {
        return [Number(position[0]), Number(position[1])];
      }
      if (position && typeof position === "object" && Number.isFinite(position.x) && Number.isFinite(position.z)) {
        return [Number(position.x), Number(position.z)];
      }
      return null;
    }

    function applyLayoutData(saved) {
      try {
        applySiteScale(saved.sceneScale || saved.siteScale || DEFAULT_SITE_SCALE);
        applyBoundaryScale(saved.boundaryScale || DEFAULT_BOUNDARY_SCALE);
        if (saved.counters) {
          Object.assign(assetCounters, saved.counters);
        }

        const savedIds = new Set((saved.items || []).map((item) => item.id));
        [...editableObjects].forEach((item) => {
          if (item.isDefault && !savedIds.has(item.id)) {
            removeEditableItem(item);
          }
        });

        (saved.items || []).forEach((savedItem) => {
          const normalizedPosition = normalizeSavedPosition(savedItem.position);
          if (!normalizedPosition) {
            return;
          }
          const existing = objectMap.get(savedItem.id);
          if (existing) {
            applyItemPosition(existing, normalizedPosition[0], normalizedPosition[1]);
            existing.group.scale.setScalar(savedItem.scale || 1);
            return;
          }

          const created = createAsset({
            id: savedItem.id,
            name: savedItem.name,
            type: savedItem.type,
            position: normalizedPosition,
            isDefault: false
          });
          created.group.scale.setScalar(savedItem.scale || 1);
        });

        return true;
      } catch (error) {
        console.error(error);
        return false;
      }
    }

    function loadLayoutFromStorage() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return false;
      return applyLayoutData(JSON.parse(raw));
    }

    async function loadBundledLayout() {
      try {
        const response = await fetch("./taroko_3d_editor_layout.json", { cache: "no-store" });
        if (!response.ok) return false;
        const saved = await response.json();
        return applyLayoutData(saved);
      } catch (error) {
        console.error(error);
        return false;
      }
    }

    function exportLayout() {
      const payload = {
        exportedAt: new Date().toISOString(),
        sceneScale: Number(root.scale.x.toFixed(2)),
        boundaryScale: Number(siteBoundaryScale.toFixed(2)),
        counters: assetCounters,
        items: editableObjects.map((item) => ({
          id: item.id,
          name: item.name,
          type: item.type,
          isDefault: item.isDefault,
          position: {
            x: Number(item.group.position.x.toFixed(2)),
            z: Number(item.group.position.z.toFixed(2))
          },
          positionArray: [
            Number(item.group.position.x.toFixed(2)),
            Number(item.group.position.z.toFixed(2))
          ],
          scale: Number(item.group.scale.x.toFixed(2))
        }))
      };

      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "taroko_3d_editor_layout.json";
      link.click();
      URL.revokeObjectURL(url);
    }

    function nextName(type) {
      assetCounters[type] = (assetCounters[type] || 0) + 1;
      return `${TYPE_LABELS[type]} ${assetCounters[type]}`;
    }

    function addNewAsset(type) {
      const basePosition = selectedItem
        ? [selectedItem.group.position.x + 6, selectedItem.group.position.z + 6]
        : [10, 0];
      const safe = nearestInsidePoint(basePosition[0], basePosition[1]);
      const asset = createAsset({
        id: `${type}-${Date.now()}`,
        name: nextName(type),
        type,
        position: [safe.x, safe.z],
        isDefault: false
      });
      populateObjectSelect();
      selectItem(asset);
      updateStatus(`${UI_TEXT.statusAdded}${asset.name}`);
    }

    function duplicateSelectedTent() {
      if (!selectedItem || !selectedItem.type.endsWith("Tent")) {
        updateStatus(UI_TEXT.statusDuplicateOnlyTent);
        return;
      }

      const safe = nearestInsidePoint(selectedItem.group.position.x + 5, selectedItem.group.position.z + 5);
      const copy = createAsset({
        id: `${selectedItem.type}-${Date.now()}`,
        name: nextName(selectedItem.type),
        type: selectedItem.type,
        position: [safe.x, safe.z],
        isDefault: false,
        labelText: selectedItem.type === "audienceTent" ? "" : selectedItem.name
      });
      copy.group.scale.copy(selectedItem.group.scale);
      populateObjectSelect();
      selectItem(copy);
      updateStatus(`${UI_TEXT.statusAdded}${copy.name}`);
    }

    function deleteSelectedAsset() {
      if (!selectedItem) {
        updateStatus(UI_TEXT.statusDeleteNeedItem);
        return;
      }
      const removedName = selectedItem.name;
      removeEditableItem(selectedItem);
      populateObjectSelect();
      selectItem(editableObjects[0] || null);
      updateStatus(`${UI_TEXT.statusDeleted}${removedName}`);
    }

    async function buildScene() {
      applySiteScale(DEFAULT_SITE_SCALE);
      applyBoundaryScale(DEFAULT_BOUNDARY_SCALE);
      addGround();
      TREE_LAYOUT.forEach(([siteX, siteZ, scale]) => addTree(siteX, siteZ, scale));
      DEFAULT_SITE_OBJECTS.forEach((config) => createAsset(config));
      populateObjectSelect();

      // For the shared web version, always prefer the bundled reference layout.
      // This avoids old browser-local saved states from pushing objects off-screen.
      const bundledLoaded = await loadBundledLayout();
      let loaded = false;
      if (!bundledLoaded) {
        loaded = loadLayoutFromStorage();
      }

      populateObjectSelect();
      selectItem(editableObjects[0] || null);
      frameSceneToRoot();

      if (bundledLoaded) {
        updateStatus(UI_TEXT.statusBundledLoaded);
      } else if (loaded) {
        updateStatus(UI_TEXT.statusLoaded);
      }
    }

    function resetCameraView() {
      camera.position.copy(cameraHome.position);
      controls.target.copy(cameraHome.target);
      controls.update();
    }

    renderer.domElement.addEventListener("pointerdown", (event) => {
      const hit = pickItem(event);
      if (!hit) return;
      selectItem(hit.item);
      updatePointer(event);
      raycaster.setFromCamera(pointer, camera);
      if (raycaster.ray.intersectPlane(dragPlane, dragPoint)) {
        const localPoint = worldToLocal(dragPoint);
        controls.enabled = false;
        controls.autoRotate = false;
        if (hit.kind === "scaleHandle") {
          scaling = true;
          updateStatus(`${UI_TEXT.statusScaleHandle}${selectedItem.name}`);
        } else {
          dragOffset.copy(localPoint).sub(selectedItem.group.position);
          dragging = true;
          updateStatus(`${UI_TEXT.statusDragging}${selectedItem.name}`);
        }
      }
    });

    window.addEventListener("pointermove", (event) => updateDraggedItem(event));

    window.addEventListener("pointerup", () => {
      if (dragging && selectedItem) {
        updateStatus(`${UI_TEXT.statusDropped}${selectedItem.name}`);
      } else if (scaling && selectedItem) {
        updateStatus(`${UI_TEXT.statusSelected}${selectedItem.name}`);
      }
      dragging = false;
      scaling = false;
      controls.enabled = true;
    });

    editorControls.objectSelect.addEventListener("change", (event) => {
      selectItem(objectMap.get(event.target.value) || null);
    });

    editorControls.siteScale.addEventListener("input", () => {
      const scale = Number(editorControls.siteScale.value);
      applySiteScale(scale);
      updateStatus(`${UI_TEXT.statusSiteScale}${scale.toFixed(2)}`);
    });

    editorControls.boundaryScale.addEventListener("input", () => {
      const scale = Number(editorControls.boundaryScale.value);
      applyBoundaryScale(scale);
      updateStatus(`${UI_TEXT.statusBoundaryScale}${scale.toFixed(2)}`);
    });

    editorControls.posX.addEventListener("input", () => {
      if (!selectedItem) return;
      applyItemPosition(selectedItem, Number(editorControls.posX.value), selectedItem.group.position.z);
      updateControlValues();
    });

    editorControls.posZ.addEventListener("input", () => {
      if (!selectedItem) return;
      applyItemPosition(selectedItem, selectedItem.group.position.x, Number(editorControls.posZ.value));
      updateControlValues();
    });

    editorControls.scaleValue.addEventListener("input", () => {
      if (!selectedItem) return;
      const scale = Number(editorControls.scaleValue.value);
      selectedItem.group.scale.setScalar(scale);
      updateControlValues();
    });

    document.getElementById("resetView").addEventListener("click", () => {
      resetCameraView();
      updateStatus(UI_TEXT.statusViewReset);
    });

    document.getElementById("toggleRotate").addEventListener("click", () => {
      controls.autoRotate = !controls.autoRotate;
      updateStatus(controls.autoRotate ? UI_TEXT.statusRotateOn : UI_TEXT.statusRotateOff);
    });

    document.getElementById("duplicateTent").addEventListener("click", () => {
      duplicateSelectedTent();
    });

    document.getElementById("deleteAsset").addEventListener("click", () => {
      deleteSelectedAsset();
    });

    document.getElementById("resetLayout").addEventListener("click", () => {
      resetLayout();
    });

    document.getElementById("saveLayout").addEventListener("click", () => {
      saveLayoutToStorage();
      updateStatus(UI_TEXT.statusSaved);
    });

    document.getElementById("importLayout").addEventListener("click", () => {
      editorControls.importLayoutFile.click();
    });

    editorControls.importLayoutFile.addEventListener("change", async (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      try {
        const raw = await file.text();
        const parsed = JSON.parse(raw);
        const applied = applyLayoutData(parsed);
        populateObjectSelect();
        selectItem(editableObjects[0] || null);
        frameSceneToRoot();
        updateStatus(applied ? UI_TEXT.statusImported : UI_TEXT.statusImportFailed);
      } catch (error) {
        console.error(error);
        updateStatus(UI_TEXT.statusImportFailed);
      } finally {
        event.target.value = "";
      }
    });

    document.getElementById("exportLayout").addEventListener("click", () => {
      exportLayout();
      updateStatus(UI_TEXT.statusExported);
    });

    document.getElementById("addAudienceTent").addEventListener("click", () => addNewAsset("audienceTent"));
    document.getElementById("addLedWall").addEventListener("click", () => addNewAsset("ledWall"));
    document.getElementById("addToilet").addEventListener("click", () => addNewAsset("toiletArea"));

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    buildScene().then(() => {
      animate();
    });
  </script>
</body>
</html>
